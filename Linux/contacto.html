<html>
    <head>
        <title>Comentarios</title>
    </head>
    <body bgcolor="0AADFF">
        <font size="12" color="000000" face="Arial"><b>Comentarios</b></font><br>
        <h2>Deja tu comentario sobre <ins>Linux para principiantes</ins></h2>
    <form>
        <label>Nombre:</label>
        <input type="text" name="nombre" placeholder="Escribe tu nombre completo"><br><br>
        <label>Correo Electrónico:</label>
        <input type="email" name="email"><br><br>
        <fieldset>
            <legend>¿Qué te pareció el contenido?</legend>
            <input type="radio" name="opinion" value="Excelente"> Excelente<br>
            <input type="radio" name="opinion" value="Bueno"> Bueno<br>
            <input type="radio" name="opinion" value="Regular"> Regular<br>
            <input type="radio" name="opinion" value="Malo"> Malo<br><br>
        </fieldset>
        <fieldset>
            <legend>¿Qué nos deseas enviar?</legend>
            <input type="checkbox" name="sugerencia" value="Sugerencia"> Sugerencia<br>
            <input type="checkbox" name="comentario" value="Comentario"> Comentario<br>
            <input type="checkbox" name="pregunta" value="Pregunta"> Pregunta<br>
            <input type="checkbox" name="queja" value="Queja"> Queja<br>
            <input type="checkbox" name="otro" value="Otro"> Otro<br>
        </fieldset>
        <br><label>Escribe tu mensaje:</label><br>
        <textarea name="mensaje" placeholder="Escribe tu mensaje" rows="5" cols="40"></textarea><br><br>
        <input type="submit" name="enviar" value="Enviar">
    </form>
    </body>
</html>
